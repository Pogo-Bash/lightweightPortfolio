  html, body {
    width: 88px;
    height: 31px;
    overflow: hidden;
    background: transparent;

  .btn {
    width: 88px;
    height: 31px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: stretch;
    background: #0e000e;
    border: 1px solid #3d003d;
  }

  .m-icon {
    width: 29px;
    height: 31px;
    flex-shrink: 0;
    background: #0e000e;
    border-right: 1px solid #3d003d;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .m-grid {
    display: grid;
    grid-template-columns: repeat(18, 1px);
    grid-template-rows: repeat(22, 1px);
    image-rendering: pixelated;
    transform: scale(1.35);
    transform-origin: center center;
  }
  .m-grid div { width:1px; height:1px; background: transparent; }

  .m-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .m-text span {
    font-family: 'Press Start 2P', monospace;
    color: #ff5fac;
    line-height: 1;
    display: block;
    text-shadow: 0 0 4px #ff149366;
  }
  .m-text .t1 { font-size: 5px; letter-spacing: 0.3px; }
