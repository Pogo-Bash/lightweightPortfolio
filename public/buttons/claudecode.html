<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude 88x31</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 88px;
    height: 31px;
    overflow: hidden;
    background: transparent;
  }

  .window {
    width: 88px;
    height: 31px;
    display: flex;
    flex-direction: column;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid #111;
  }

  .titlebar {
    width: 100%;
    height: 8px;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    padding: 0 3px;
    gap: 2px;
    flex-shrink: 0;
    border-bottom: 1px solid #222;
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.red    { background: #ff5f57; border: 0.5px solid #c9322a; }
  .dot.yellow { background: #febc2e; border: 0.5px solid #c98f00; }
  .dot.green  { background: #28c840; border: 0.5px solid #15922a; }

  .terminal {
    flex: 1;
    background: #1c1f2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding-bottom: 1px;
  }

  .terminal span {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #CC6B4A;
    line-height: 1;
    text-shadow: 1px 1px 0 #7a3320;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="terminal">
      <span>CLAUDE</span>
      <span>CODE</span>
    </div>
  </div>
</body>
</html>
