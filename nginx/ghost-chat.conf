# Ghost Chat signaling server — location blocks to add to your default server block
# in /etc/nginx/sites-available/default.
#
# Your existing setup:
#   - Host nginx on :80 proxies everything to the portfolio Docker container on :3001
#   - Ghost Chat signaling server runs on :3002
#   - The /chat HTML page is already served by the Astro static build inside Docker
#
# Add these location blocks ABOVE the existing "location /" catch-all:

    # Ghost Chat — WebSocket
    location /ghost/ws {
        proxy_pass http://127.0.0.1:3002/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Ghost Chat — API
    location /ghost/api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
